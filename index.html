<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akan Name Generator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Akan Name Generator</h1>
    <p>Enter your birthdate and gender to discover your Akan name, based on Ghanaian and Ivorians tradition.</p>
    <form id="akanForm">
        <label>Day: <input type="number" id="day" min="1" max="31" required></label>
        <label>Month: <input type="number" id="month" min="1" max="12" required></label>
        <label>Year: <input type="number" id="year" required></label>
        <label><input type="radio" name="gender" value="male"> Male</label>
        <label><input type="radio" name="gender" value="female"> Female</label>
        <button type="submit">Get Akan Name</button>
    </form>
    <div id="result"></div>
    <script src="script.js"></script>
</body>

</html>
